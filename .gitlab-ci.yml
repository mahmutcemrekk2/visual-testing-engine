image: node:20

default:
  tags: 
    - testautomation

stages:
  - test
  - report

# Not: AI_PROVIDER ve API key'ini GitLab → Settings → CI/CD → Variables'a ekle

visual-regression:
  stage: test
  
  before_script:
    - npm ci
    - npx playwright install chromium --with-deps

  script:
    - node test-run.js

  artifacts:
    when: always
    paths:
      - allure-results/
      - screenshots/**/diff.png
      - screenshots/**/current.png
    expire_in: 7 days

  only:
    - main
    - develop
    - merge_requests

allure-report:
  stage: report
  when: always
  dependencies:
    - visual-regression

  before_script:
    - npm install -g allure-commandline

  script:
    - allure generate allure-results --clean -o allure-report

  artifacts:
    when: always
    paths:
      - allure-report/
    expire_in: 7 days

  only:
    - main
    - develop
    - merge_requests
